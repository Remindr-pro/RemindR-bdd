name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: remindr
          POSTGRES_PASSWORD: remindr_password
          POSTGRES_DB: remindr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://remindr:remindr_password@localhost:5432/remindr_test?schema=public

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://remindr:remindr_password@localhost:5432/remindr_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Hub secrets
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
        run: |
          if [ -z "$DOCKER_HUB_USERNAME" ]; then
            echo "::error::DOCKER_HUB_USERNAME secret is not set or is empty"
            echo "Please configure it in: Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "$DOCKER_HUB_TOKEN" ]; then
            echo "::error::DOCKER_HUB_TOKEN secret is not set or is empty"
            echo "Please configure it in: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ Docker Hub secrets are configured"
          echo "Username: '$DOCKER_HUB_USERNAME'"
          echo "Username length: ${#DOCKER_HUB_USERNAME}"
          echo "Token length: ${#DOCKER_HUB_TOKEN}"
          echo "Token starts with: ${DOCKER_HUB_TOKEN:0:10}..."
          
          # Vérifier le format du token
          if [[ ! "$DOCKER_HUB_TOKEN" =~ ^dckr_pat_ ]]; then
            echo "::error::Token doesn't start with 'dckr_pat_'. Make sure you're using an Access Token, not your password."
            echo "Create a new token at: https://hub.docker.com/settings/security"
            exit 1
          fi
          
          # Vérifier qu'il n'y a pas d'espaces
          if [[ "$DOCKER_HUB_USERNAME" =~ [[:space:]] ]]; then
            echo "::warning::Username contains whitespace. This may cause issues."
          fi
          if [[ "$DOCKER_HUB_TOKEN" =~ [[:space:]] ]]; then
            echo "::warning::Token contains whitespace. This may cause issues."
          fi

      - name: Login to Docker Hub
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
        run: |
          # Nettoyer les espaces et retours à la ligne
          USERNAME=$(echo -n "$DOCKER_HUB_USERNAME" | tr -d '[:space:]')
          TOKEN=$(echo -n "$DOCKER_HUB_TOKEN" | tr -d '[:space:]')
          
          echo "Logging in to Docker Hub..."
          echo "$TOKEN" | docker login -u "$USERNAME" --password-stdin
          
          # Vérifier que le login a réussi
          if [ $? -eq 0 ]; then
            echo "✅ Successfully logged in to Docker Hub"
          else
            echo "::error::Failed to login to Docker Hub"
            echo "Please verify:"
            echo "1. Username: $USERNAME"
            echo "2. Token is valid and has Read & Write permissions"
            echo "3. Token starts with 'dckr_pat_'"
            echo "4. No extra spaces or characters in secrets"
            exit 1
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/remindr-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/remindr-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/remindr-api:buildcache,mode=max